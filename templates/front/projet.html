{% extends "front/base.html" %}
{% block content %}

<section class="grid grid-cols-2 gap-10 px-6 pt-10 pb-10">

    {% for projet in projet %}
    <a class="border-2 border-solid rounded-lg border-blue-200 shadow-lg" href="/projet/{{projet['_id']}}">
        <h1 class="text-center font-semibold text-3xl">{{projet.titreProjet}}</h1>
        <hr>
        <h2 class="text-center font-normal text-2xl">{{projet.descriptionProjet}}</h2>
        <div class="flex justify-center">
            <img src="{{projet.imageProjet}}" width="200" class="py-3">
        </div>
        <p class="text-center font-semibold pl-3">{{projet.auteurProjet}}</p>    
        
        <div class="flex justify-center">
            <p class="text-center font-normal justify-self-end pl-3">Publié le {{projet.dateProjet}}</p>
        </div>
    </a> 
    {% endfor %}

</section>


{% endblock %}
