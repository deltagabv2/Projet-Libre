{% extends 'front/base.html' %}
{% block content %}

<h1 class="text-center font-semibold text-3xl">{{projet.titreProjet}}</h1>
<hr>
<h2 class="text-center font-normal text-2xl">{{projet.descriptionProjet}}</h2>
<div class="flex justify-center">
    <img src="{{projet.imageProjet}}" width="200" class="py-3">
</div>
{% if projet.ytProjet %}
    <div class="flex justify-center">
        <iframe width="560" height="315" src="https://www.youtube.com/embed/{{projet.ytProjet}}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen ></iframe>
    </div>
{% endif %}
<div class="flex justify-center">
    <a class="text-center font-semibold pl-3" href="/user/{{auteur['_id']}}">{{projet.auteurProjet}}</a>  
</div>

<p class="text-center font-normal pl-3">Publié le {{projet.dateProjet}}</p>


{% endblock %}
